<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{block name="title"}库存管理系统{/block}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f5f6fa; }
        .sidebar {
            background: #1a1a2e;
            min-height: 100vh;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,.7);
            padding: .75rem 1.5rem;
            transition: .2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,.1);
        }
        .sidebar .nav-link i { margin-right: .5rem; }
        .sidebar .brand {
            color: #fff;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,.1);
            margin-bottom: 1rem;
        }
        .main-content { padding: 2rem; }
        .page-header {
            background: #fff;
            padding: 1.5rem 2rem;
            border-radius: .5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 4px rgba(0,0,0,.04);
        }
        .card-dashboard {
            border: none;
            border-radius: .5rem;
            box-shadow: 0 2px 4px rgba(0,0,0,.04);
        }
        .stat-card {
            background: #fff;
            border-radius: .5rem;
            padding: 1.5rem;
            box-shadow: 0 2px 4px rgba(0,0,0,.04);
        }
        .stat-card .num {
            font-size: 2rem;
            font-weight: 700;
        }
        .stat-card .label {
            color: #6c757d;
            font-size: .875rem;
        }
        .badge-stock-low {
            background: #fee2e2;
            color: #dc2626;
        }
        .badge-stock-ok {
            background: #dcfce7;
            color: #16a34a;
        }
        .badge-stock-high {
            background: #dbeafe;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-auto px-0 sidebar d-none d-md-block" style="width: 220px;">
                <div class="brand">
                    <i class="bi bi-phone"></i> 手机库存
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link {if $menu == 'dashboard'}active{/if}" href="/admin/dashboard">
                        <i class="bi bi-speedometer2"></i> 库存看板
                    </a>
                    <a class="nav-link {if $menu == 'product'}active{/if}" href="/admin/product">
                        <i class="bi bi-box-seam"></i> 商品管理
                    </a>
                    <a class="nav-link {if $menu == 'order'}active{/if}" href="/admin/order">
                        <i class="bi bi-receipt"></i> 订单管理
                    </a>
                    <a class="nav-link {if $menu == 'warehouse'}active{/if}" href="/admin/warehouse">
                        <i class="bi bi-arrow-left-right"></i> 出入库
                    </a>
                </nav>
            </div>
            <div class="col main-content">
                {block name="content"}内容区域{/block}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
