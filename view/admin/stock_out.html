{extend name="admin/layout" /}

{block name="title"}出库 | 库存管理系统{/block}

{block name="content"}
<div class="page-header">
    <h4 class="mb-1"><i class="bi bi-box-arrow-right text-danger me-2"></i>商品出库</h4>
    <p class="text-muted mb-0">减少商品库存（如退货、损耗等）</p>
</div>

{if $error}
<div class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-triangle me-1"></i>
    库存不足，无法出库！请选择库存足够的商品。
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{/if}

<div class="card card-dashboard">
    <div class="card-body">
        <form method="post" action="/admin/stockOut">
            <div class="mb-3">
                <label class="form-label">商品</label>
                <select class="form-select" name="product_id" required>
                    <option value="">-- 请选择 --</option>
                    {foreach $products as $p}
                    <option value="{$p.id}">{$p.name|raw}（库存: {$p.stock}）</option>
                    {/foreach}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">出库数量</label>
                <input type="number" class="form-control" name="quantity"
                       value="1" step="1" min="1" required>
                <div class="form-text">出库数量不能超过当前库存</div>
            </div>

            <div class="mb-3">
                <label class="form-label">原因（可选）</label>
                <input type="text" class="form-control" name="remark"
                       placeholder="如：销售出库、退货给供应商等">
            </div>

            <button type="submit" class="btn btn-danger">
                <i class="bi bi-check-lg"></i> 确认出库
            </button>
            <a href="/admin/warehouse" class="btn btn-outline-secondary ms-2">取消</a>
        </form>
    </div>
</div>
{/block}
